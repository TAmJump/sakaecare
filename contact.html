<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | さかえケアサービス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500;700&family=Noto+Serif+JP:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/corporate.css">
</head>
<body>
    <header id="siteHeader">
        <nav class="header-nav">
            <a href="index.html" data-i18n="nav.top">Top</a>
            <a href="service.html" data-i18n="nav.service">Service</a>
            <a href="about-company.html" data-i18n="nav.company">Company</a>
            <a href="contact.html" class="nav-cta" data-i18n="nav.contact">Contact</a>
        </nav>
    </header>

    <section class="page-top">
        <span class="page-label" data-i18n="contact.label">Contact</span>
        <h1 data-i18n="contact.title">お問い合わせ</h1>
    </section>

    <section class="sec">
        <div class="narrow-form">
            <p class="body-text" style="text-align:center;margin-bottom:2.5rem;" data-i18n="contact.desc">ご質問・ご相談はこちらからお気軽にどうぞ。<br>後日、担当者よりご連絡いたします。</p>

            <form action="https://formspree.io/f/mbdaovnz" method="POST">
                <div class="fg">
                    <label data-i18n="contact.name">お名前<span class="req">*</span></label>
                    <input type="text" name="name" required data-i18n-ph="contact.ph.name" placeholder="山田 太郎">
                </div>
                <div class="fg">
                    <label data-i18n="contact.email">メールアドレス<span class="req">*</span></label>
                    <input type="email" name="email" required placeholder="info@example.com">
                </div>

                <div class="fg">
                    <label data-i18n="contact.category">お問い合わせ種別<span class="req">*</span></label>
                    <select name="category" required>
                        <option value="" data-i18n="contact.cat.select">選択してください</option>
                        <option value="DX事業" data-i18n="contact.cat.dx">DX事業について</option>
                        <option value="医療事業" data-i18n="contact.cat.medical">医療事業について</option>
                        <option value="介護事業" data-i18n="contact.cat.kaigo">介護事業について</option>
                        <option value="採用" data-i18n="contact.cat.recruit">採用について</option>
                        <option value="その他" data-i18n="contact.cat.other">その他</option>
                    </select>
                </div>
                <div class="fg">
                    <label data-i18n="contact.message">お問い合わせ内容<span class="req">*</span></label>
                    <textarea name="message" required data-i18n-ph="contact.ph.message" placeholder="お問い合わせ内容をご記入ください"></textarea>
                </div>
                <button type="submit" class="submit-btn" data-i18n="contact.submit">送信する</button>
            </form>


        </div>
    </section>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="text-logo" style="font-family:'Noto Serif JP',serif;font-size:1.1rem;font-weight:500;letter-spacing:0.08em;color:var(--black);display:block;margin-bottom:0.3rem;">Sakae Care Service</span>
                <p data-i18n="footer.brand">すべてのイノチを∞にツナぐ</p>
            </div>
            <div class="footer-links">
                <div class="footer-col">
                    <h4 data-i18n="footer.company">Company</h4>
                    <a href="about-company.html" data-i18n="footer.about">会社情報</a>
                    <a href="about-message.html" data-i18n="footer.message">代表メッセージ</a>
                    <a href="about-philosophy.html" data-i18n="footer.philosophy">経営理念</a>
                </div>
                <div class="footer-col">
                    <h4 data-i18n="footer.service">Service</h4>
                    <a href="service.html" data-i18n="footer.dx">DX</a>
                    <a href="service.html" data-i18n="footer.medical">医療</a>
                    <a href="service.html" data-i18n="footer.kaigo">介護</a>
                </div>
                <div class="footer-col">
                    <h4 data-i18n="footer.support">Support</h4>
                    <a href="contact.html" data-i18n="footer.inquiry">お問い合わせ</a>
                    <a href="recruit.html" data-i18n="footer.recruit">採用情報</a>
                </div>
                <div class="footer-col">
                    <h4 data-i18n="footer.legal">Legal</h4>
                    <a href="privacy.html" data-i18n="footer.privacy">プライバシーポリシー</a>
                    <a href="terms.html" data-i18n="footer.terms">利用規約</a>
                    <a href="security.html" data-i18n="footer.security">情報セキュリティ</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-copy" data-i18n="footer.copy">&copy; 2015 株式会社さかえケアサービス All Rights Reserved.</p>
        </div>
    </footer>
    <script>
    window.addEventListener('scroll', function() {
        var h = document.getElementById('siteHeader');
        if (h) { if (window.scrollY > 40) h.classList.add('scrolled'); else h.classList.remove('scrolled'); }
    });
    document.addEventListener('DOMContentLoaded', function() {
        var els = document.querySelectorAll('.reveal');
        if (!els.length) return;
        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.15 });
        els.forEach(function(el) { obs.observe(el); });
    });
    </script>
    <script src="js/translations.js"></script>
    <script src="js/lang.js"></script>
</body>
</html>
